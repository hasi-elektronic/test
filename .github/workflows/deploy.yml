name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        shell: bash
        env:
          RAW_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # Token aus dem Secret extrahieren – toleriert Zeilenumbrüche oder versehentlich
        # mitkopierten Text (z. B. ein komplettes curl-Beispiel) im Secret-Wert.
        run: |
          CLOUDFLARE_API_TOKEN="$(printf '%s' "$RAW_TOKEN" | grep -oE '[A-Za-z0-9_-]{40,}' | head -1)"
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN enthält keinen gültigen Token"
            exit 1
          fi
          export CLOUDFLARE_API_TOKEN
          # Projekt anlegen (falls noch nicht vorhanden); Fehler ignorieren, wenn es schon existiert
          npx wrangler pages project create sickinger-kalkulationssystem --production-branch=main 2>/dev/null || echo "Pages-Projekt existiert bereits"
          npx wrangler pages deploy dist --project-name=sickinger-kalkulationssystem --branch=main --commit-dirty=true
